<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lena — Portfolio Deck</title>
<style>
  :root{
    --bg:#0e0e12;
    --slide:#ffffff;
    --ink:#1d1d1f;
    --sub:#6e6e73;
    --line:#e6e6ea;
    --accent:#6c5ce7;
    --accent-2:#9d8bff;
    --accent-soft:#eee9ff;
    --ax:#16a085;
    --ax-2:#48c9b0;
    --shadow:0 10px 30px rgba(0,0,0,.10);
    --shadow-lg:0 24px 60px rgba(0,0,0,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;
  }

  /* ---------- DECK FRAME ---------- */
  .deck{position:fixed;inset:0;overflow:hidden}
  .track{display:flex;height:100%;width:100%;
    transition:transform .55s cubic-bezier(.22,.61,.36,1)}
  .slide{
    flex:0 0 100%;width:100%;height:100%;
    display:flex;flex-direction:column;justify-content:center;
    padding:6vh 7vw;overflow-y:auto;background:var(--slide);position:relative;
  }
  .slide::-webkit-scrollbar{width:0}

  /* ---------- TOP PROGRESS ---------- */
  .progress{position:fixed;top:0;left:0;height:4px;z-index:40;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    width:0;transition:width .45s ease;border-radius:0 4px 4px 0}

  /* ---------- NAV UI ---------- */
  .nav{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;z-index:40;
    background:rgba(20,20,26,.72);backdrop-filter:blur(12px);
    padding:9px 14px;border-radius:999px;box-shadow:var(--shadow-lg)}
  .nav button{width:34px;height:34px;border-radius:999px;border:none;cursor:pointer;
    background:rgba(255,255,255,.14);color:#fff;font-size:16px;display:flex;
    align-items:center;justify-content:center;transition:background .2s}
  .nav button:hover{background:rgba(255,255,255,.30)}
  .nav button:disabled{opacity:.3;cursor:default}
  .nav .count{color:#fff;font-size:13px;font-weight:700;min-width:52px;text-align:center;
    letter-spacing:.5px;font-variant-numeric:tabular-nums}
  .dots{position:fixed;right:24px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:9px;z-index:40}
  .dots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.32);
    cursor:pointer;transition:all .25s;display:block}
  .dots i.on{background:#fff;transform:scale(1.5)}
  .hint{position:fixed;bottom:26px;right:28px;color:rgba(255,255,255,.55);
    font-size:12px;z-index:40;letter-spacing:.3px}
  @media(max-width:720px){.dots{display:none}.hint{display:none}}
  body.clean .nav,body.clean .dots,body.clean .hint,body.clean .progress{display:none!important}

  /* ---------- COVER ---------- */
  .slide.cover{
    background:linear-gradient(135deg,#7c6cf0,#9d8bff 55%,#b6a7ff);color:#fff;justify-content:center}
  .cover .eyebrow{font-weight:800;font-size:clamp(13px,1.4vw,16px);letter-spacing:2px;opacity:.9;text-transform:uppercase}
  .cover h1{font-size:clamp(40px,6.5vw,84px);line-height:1.05;letter-spacing:-2px;margin:18px 0 20px;font-weight:800}
  .cover p{font-size:clamp(16px,2vw,23px);max-width:680px;line-height:1.5;opacity:.95}
  .cover .meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:34px}
  .cover .pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
    border-radius:999px;padding:10px 18px;font-size:clamp(12px,1.4vw,15px);font-weight:700;backdrop-filter:blur(6px)}
  .cover .pill b{font-weight:900}

  /* ---------- INTRO (핵심 역량) ---------- */
  .slide.intro{justify-content:center}
  .intro-head{max-width:1120px;margin:0 auto 24px;width:100%}
  .intro-head h2{font-size:clamp(26px,4vw,50px);font-weight:800;letter-spacing:-1px;margin:12px 0 8px}
  .intro-head p{color:var(--sub);font-size:clamp(14px,1.7vw,19px);line-height:1.5}
  .pillars{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:1120px;margin:0 auto;width:100%}
  .pillar{background:#fafafb;border:1px solid var(--line);border-radius:18px;padding:22px 24px;
    box-shadow:0 4px 16px rgba(0,0,0,.04);position:relative;overflow:hidden}
  .pillar:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .pillar.ax:before{background:var(--ax)}
  .pillar .pico{font-size:26px;line-height:1}
  .pillar h3{font-size:clamp(16px,1.9vw,21px);font-weight:800;margin:12px 0 8px;letter-spacing:-.3px}
  .pillar p{color:#3a3a40;font-size:clamp(12.5px,1.45vw,15px);line-height:1.55}
  .pillar p b{color:var(--accent);font-weight:800}
  .pillar.ax p b{color:var(--ax)}

  /* ---------- SECTION DIVIDER ---------- */
  .slide.section{justify-content:center;color:#fff}
  .slide.section.s-ax{background:linear-gradient(135deg,#16a085,#1abc9c 55%,#48c9b0)}
  .slide.section.s-acc{background:linear-gradient(135deg,#5b4bd6,#7c6cf0 55%,#9d8bff)}
  .slide.section.s-dark{background:linear-gradient(135deg,#23232b,#34343f 60%,#45455a)}
  .section .num{font-size:clamp(60px,12vw,150px);font-weight:900;opacity:.22;line-height:1;letter-spacing:-4px}
  .section h2{font-size:clamp(34px,5.5vw,70px);font-weight:800;letter-spacing:-1.5px;margin:-10px 0 14px}
  .section .sdesc{font-size:clamp(15px,2vw,22px);opacity:.92}

  /* ---------- PROJECT SLIDE ---------- */
  .proj{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(24px,4vw,60px);align-items:center;width:100%;max-width:1280px;margin:0 auto}
  .chip-cat{display:inline-block;background:var(--accent-soft);color:var(--accent);
    font-weight:800;font-size:clamp(11px,1.2vw,13px);letter-spacing:.4px;
    padding:6px 14px;border-radius:999px;text-transform:uppercase}
  .chip-cat.ax{background:#e3f7f1;color:var(--ax)}
  .proj h2{font-size:clamp(26px,3.6vw,44px);letter-spacing:-1px;margin:14px 0 8px;font-weight:800}
  .proj-sub{color:var(--sub);font-size:clamp(13.5px,1.6vw,18px);line-height:1.45}
  .proj-meta{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 16px}
  .proj-meta span{background:#f2f2f5;border:1px solid var(--line);border-radius:999px;
    padding:6px 13px;font-size:clamp(11px,1.3vw,13.5px);font-weight:700;color:#3a3a40}
  .proj-about{color:#3a3a40;font-size:clamp(12.5px,1.45vw,15.5px);line-height:1.55;margin-bottom:12px}
  .proj-points{list-style:none;display:flex;flex-direction:column;gap:7px}
  .proj-points li{position:relative;padding-left:22px;font-size:clamp(12px,1.4vw,15px);
    line-height:1.5;color:#2c2c2e}
  .proj-points li:before{content:"›";position:absolute;left:5px;top:-1px;color:var(--accent);font-weight:900}
  .proj-why{margin-top:14px;background:var(--accent-soft);border-left:3px solid var(--accent);
    border-radius:0 12px 12px 0;padding:12px 16px;font-size:clamp(12px,1.4vw,14.5px);
    line-height:1.55;color:#3a2f6b}
  .proj-why.ax{background:#e3f7f1;border-left-color:var(--ax);color:#0f5e4d}
  .proj-why .why-label{display:block;font-weight:900;font-size:11px;letter-spacing:.5px;
    color:var(--accent);margin-bottom:5px}
  .proj-why.ax .why-label{color:var(--ax)}
  .stack{display:flex;gap:7px;flex-wrap:wrap;margin-top:16px}
  .stack span{background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:6px 13px;font-size:clamp(11px,1.25vw,13px);font-weight:700;color:#3a3a40;box-shadow:0 2px 8px rgba(0,0,0,.04)}

  .proj-shots{display:flex;align-items:center;justify-content:center;gap:14px}
  .proj-shots.phones img{height:clamp(260px,56vh,480px);border-radius:22px;
    box-shadow:var(--shadow-lg);border:1px solid var(--line);background:#fff}
  .proj-shots.phones img:nth-child(2){transform:translateY(-14px)}
  .proj-shots.phones img:nth-child(3){transform:translateY(8px)}
  .proj-shots.wide img{width:100%;max-height:64vh;object-fit:cover;border-radius:18px;
    box-shadow:var(--shadow-lg);border:1px solid var(--line)}

  /* ---------- POGNY (멀티 서비스) ---------- */
  .pogny{justify-content:flex-start;padding-top:5vh}
  .pogny-head{max-width:1280px;margin:0 auto 18px;width:100%}
  .pogny-head h2{font-size:clamp(24px,3.4vw,42px);letter-spacing:-1px;margin:12px 0 8px;font-weight:800}
  .pogny-head p{color:#3a3a40;font-size:clamp(12.5px,1.45vw,15.5px);line-height:1.5;max-width:960px}
  .pogny-why{max-width:1280px;margin:10px auto 0;width:100%;background:#e3f7f1;border-left:3px solid var(--ax);
    border-radius:0 12px 12px 0;padding:11px 16px;font-size:clamp(12px,1.35vw,14px);line-height:1.5;color:#0f5e4d}
  .pogny-why b{color:var(--ax);font-weight:900}
  .svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:1280px;margin:16px auto 0;width:100%}
  .svc-card{display:flex;gap:14px;background:#fafafb;border:1px solid var(--line);
    border-radius:18px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.04)}
  .svc-card img{width:80px;border-radius:12px;border:1px solid var(--line);object-fit:cover;
    align-self:flex-start;background:#fff;flex-shrink:0}
  .svc-info h4{font-size:clamp(13.5px,1.55vw,16.5px);font-weight:800;display:flex;align-items:center;
    gap:8px;flex-wrap:wrap;letter-spacing:-.3px}
  .svc-info .badge{font-size:10.5px;font-weight:800;background:#e3f7f1;color:var(--ax);
    border-radius:6px;padding:3px 8px;letter-spacing:.3px}
  .svc-info p{color:var(--sub);font-size:clamp(11px,1.25vw,12.5px);line-height:1.4;margin:6px 0 7px}
  .svc-info ul{list-style:none;display:flex;flex-direction:column;gap:3px}
  .svc-info li{position:relative;padding-left:15px;font-size:clamp(10.5px,1.2vw,12px);
    line-height:1.4;color:#3a3a40}
  .svc-info li:before{content:"›";position:absolute;left:2px;color:var(--ax);font-weight:900}

  /* ---------- CONTACT ---------- */
  .slide.contact{background:linear-gradient(135deg,#23232b,#34343f 60%,#45455a);color:#fff;justify-content:center}
  .contact h2{font-size:clamp(32px,5vw,64px);font-weight:800;letter-spacing:-1.5px;margin-bottom:18px}
  .contact p{font-size:clamp(15px,2vw,21px);opacity:.9;line-height:1.6;max-width:640px}
  .contact .links{display:flex;gap:12px;flex-wrap:wrap;margin-top:30px}
  .contact .links a{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);
    color:#fff;text-decoration:none;border-radius:999px;padding:12px 24px;font-weight:700;
    font-size:clamp(13px,1.6vw,16px);transition:background .2s}
  .contact .links a:hover{background:rgba(255,255,255,.30)}

  @media(max-width:860px){
    .proj{grid-template-columns:1fr;gap:24px}
    .proj-shots{order:2}
    .proj-shots.phones img{height:38vh}
    .pillars{grid-template-columns:1fr}
    .svc-grid{grid-template-columns:1fr}
    .svc-card img{width:64px}
  }
</style>
</head>

}
function projectSlide(a){

        <h2>${a.name}</h2>

const track = document.getElementById('track');
track.innerHTML = DECK.map(s=>{
  if(s.kind==='cover')   return coverSlide();
  if(s.kind==='intro')   return introSlide();
  if(s.kind==='section') return sectionSlide(s);
  if(s.kind==='pogny')   return pognySlide(APPS.pogny);
  if(s.kind==='contact') return contactSlide();
  return projectSlide(APPS[s.key]);
}).join('');

/* ===== 내비게이션 ===== */
const total = DECK.length;
let idx = 0;
const dots = document.getElementById('dots');
dots.innerHTML = DECK.map((_,i)=>`<i data-i="${i}"></i>`).join('');
const dotEls = [...dots.children];
const countEl = document.getElementById('count');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const progress = document.getElementById('progress');

function go(i){
  idx = Math.max(0, Math.min(total-1, i));
  track.style.transform = `translateX(-${idx*100}%)`;
  countEl.textContent = `${idx+1} / ${total}`;
  progress.style.width = `${(idx/(total-1))*100}%`;
  dotEls.forEach((d,k)=>d.classList.toggle('on', k===idx));
  prevBtn.disabled = idx===0;
  nextBtn.disabled = idx===total-1;
  if(location.hash !== '#'+idx) history.replaceState(null,'','#'+idx);
}
const next = ()=>go(idx+1), prev = ()=>go(idx-1);
nextBtn.onclick = next; prevBtn.onclick = prev;
dotEls.forEach(d=>d.onclick=()=>go(+d.dataset.i));

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  else if(e.key==='Home'){go(0);}
  else if(e.key==='End'){go(total-1);}
  else if(e.key==='f'||e.key==='F'){
    if(document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }
});

/* 터치 스와이프 */
let tx=0;
track.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
track.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){ dx<0?next():prev(); }
},{passive:true});

/* 휠(트랙패드) — 가로/세로 모두 인식, 디바운스 */
let wheelLock=false;
window.addEventListener('wheel',e=>{
  const d = Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
  if(Math.abs(d)<24||wheelLock) return;
  wheelLock=true; d>0?next():prev();
  setTimeout(()=>wheelLock=false,650);
},{passive:true});

if(location.search.indexOf('clean')>-1) document.body.classList.add('clean');
go(parseInt(location.hash.slice(1))||0);
